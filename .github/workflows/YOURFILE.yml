name: Verify Secret

on:
  push:
    branches:
      - main
      - staging

jobs:
  verify-secret:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify Secret
        env:
          CI_SECRET_MESSAGE: ${{ secrets.CI_SECRET_MESSAGE }}
        run: |
          if [ -z "$CI_SECRET_MESSAGE" ]; then
            echo "Secret missing"
            exit 1
          else
            echo "GitHub Secret detected"
          fi
